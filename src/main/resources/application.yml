spring:
  application:
    name: cloud-processing

  # Java 21 virtual threads — dramatically increases I/O throughput at no cost
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cloudprocessing}
    username: ${DB_USERNAME:cloudprocessing}
    password: ${DB_PASSWORD:secret}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: validate         # schema managed by Flyway; never let Hibernate mutate it
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# ── Actuator ────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: Cloud Processing Service
    description: Async file compression with S3 presigned uploads

# ── Application-specific settings ───────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-chars!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 h

  s3:
    bucket: ${S3_BUCKET:cloud-processing-files}
    region: ${AWS_REGION:us-east-1}
    endpoint: ${AWS_ENDPOINT_URL:}                 # Set for LocalStack; blank for real AWS
    presigned-url-expiration-minutes: 15

  async:
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 100
