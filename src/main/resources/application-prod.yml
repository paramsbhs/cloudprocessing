spring:
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    show-sql: false

logging:
  level:
    com.cloudprocessing: INFO
    root: WARN

management:
  endpoint:
    health:
      show-details: never

# In production, all secrets come from environment variables:
#   DB_URL, DB_USERNAME, DB_PASSWORD
#   JWT_SECRET
#   S3_BUCKET, AWS_REGION
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (or instance profile)
